<!DOCTYPE html>
<html lang="sv">

<head>

content="default-src 'self' https:;">

content="Portfolio med filtrerbart galleri byggt med HTML, CSS, JavaScript och Bootstrap">

<title>Min Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">
Portfolio
</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu"
aria-controls="menu"
aria-expanded="false"
aria-label="Öppna navigationsmeny">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse"
id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="nav-link"
href="index.html">

Hem

</li>

<li class="nav-item">

<a class="nav-link"
href="about.html">

Om mig

</a>

</li>

<li class="nav-item">

<a class="nav-link"
href="contact.html">

Kontakt

</a>

</li>

</ul>

</div>

</div>

</nav>

</header>


<main>

<section class="hero text-center">

<h1>Min Portfolio</h1>

<h2 class="fs-5">
Responsiv portfolio med JavaScript och Bootstrap
</h2>

</section>


<section class="container">

<div class="text-center mb-4">

<button
class="btn btn-primary filter-btn"
data-filter="all"
aria-label="Visa alla projekt">

Alla

</button>


<button
class="btn btn-success filter-btn"
data-filter="nature"
aria-label="Filtrera naturbilder">

Natur

</button>


<button
class="btn btn-warning filter-btn"
data-filter="city"
aria-label="Filtrera stadsbilder">

Stad

</button>

</div>


<div class="row">


<div class="col-md-4 gallery-item nature">

<div class="card">

<img
src="https://picsum.photos/600/400/?1"
class="card-img-top"
alt="Naturbild med landskap"
width="600"
height="400"
loading="lazy">

<div class="card-body">

<h3 class="h5">

Natur

</h3>

</div>

</div>

</div>



<div class="col-md-4 gallery-item city">

<div class="card">

<img
src="https://picsum.photos/600/400/?2"
class="card-img-top"
alt="Stadsbild med byggnader"
width="600"
height="400"
loading="lazy">

<div class="card-body">

<h3 class="h5">

Stad

</h3>

</div>

</div>

</div>



<div class="col-md-4 gallery-item nature">

<div class="card">

<img
src="https://picsum.photos/600/400/?3"
class="card-img-top"
alt="Naturbild med skog"
width="600"
height="400"
loading="lazy">

<div class="card-body">

<h3 class="h5">

Natur 2

</h3>

</div>

</div>

</div>

</div>

</section>

</main>


<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
